<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="112" ry="112" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Scanner frame (corners) -->
  <g stroke="#FFFFFF" stroke-width="24" fill="none" stroke-linecap="round">
    <!-- Top-left corner -->
    <polyline points="136,176 136,136 176,136"/>
    <!-- Top-right corner -->
    <polyline points="336,136 376,136 376,176"/>
    <!-- Bottom-left corner -->
    <polyline points="136,336 136,376 176,376"/>
    <!-- Bottom-right corner -->
    <polyline points="336,376 376,376 376,336"/>
  </g>

  <!-- Package / Box -->
  <g fill="#FFFFFF" opacity="0.95">
    <!-- Box body -->
    <rect x="196" y="196" width="120" height="100" rx="8" ry="8"/>
    <!-- Box top flap -->
    <polygon points="196,196 256,166 316,196"/>
    <!-- Tape strip -->
    <rect x="246" y="166" width="20" height="130" rx="4" ry="4" opacity="0.2" fill="#2563EB"/>
  </g>

  <!-- Barcode lines on box -->
  <g stroke="#2563EB" stroke-width="6" stroke-linecap="round" opacity="0.7">
    <line x1="216" y1="226" x2="216" y2="266"/>
    <line x1="232" y1="226" x2="232" y2="266"/>
    <line x1="244" y1="226" x2="244" y2="266"/>
    <line x1="256" y1="226" x2="256" y2="266"/>
    <line x1="276" y1="226" x2="276" y2="266"/>
    <line x1="288" y1="226" x2="288" y2="266"/>
    <line x1="296" y1="226" x2="296" y2="266"/>
  </g>

  <!-- Scanner laser line -->
  <line x1="136" y1="256" x2="376" y2="256" stroke="#EF4444" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <circle cx="256" cy="256" r="16" fill="#EF4444" opacity="0.3"/>

  <!-- ScanOrder text (optional, for branding) -->
  <text x="256" y="460" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="48" font-weight="700" fill="#FFFFFF" opacity="0.9">ScanOrder</text>
</svg>
