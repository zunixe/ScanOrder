<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="108" height="108">
  <!-- Background -->
  <rect x="0" y="0" width="108" height="108" rx="24" ry="24" fill="#2563EB"/>

  <!-- Scanner corners -->
  <g stroke="#FFFFFF" stroke-width="5" fill="none" stroke-linecap="round">
    <polyline points="28,38 28,28 38,28"/>
    <polyline points="70,28 80,28 80,38"/>
    <polyline points="28,70 28,80 38,80"/>
    <polyline points="70,80 80,80 80,70"/>
  </g>

  <!-- Package box -->
  <g fill="#FFFFFF" opacity="0.95">
    <rect x="42" y="42" width="24" height="20" rx="2" ry="2"/>
    <polygon points="42,42 54,36 66,42"/>
    <rect x="52" y="36" width="4" height="26" rx="1" ry="1" opacity="0.2" fill="#2563EB"/>
  </g>

  <!-- Barcode -->
  <g stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" opacity="0.7">
    <line x1="46" y1="48" x2="46" y2="56"/>
    <line x1="49" y1="48" x2="49" y2="56"/>
    <line x1="52" y1="48" x2="52" y2="56"/>
    <line x1="54" y1="48" x2="54" y2="56"/>
    <line x1="58" y1="48" x2="58" y2="56"/>
    <line x1="60" y1="48" x2="60" y2="56"/>
    <line x1="62" y1="48" x2="62" y2="56"/>
  </g>

  <!-- Laser line -->
  <line x1="28" y1="54" x2="80" y2="54" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <circle cx="54" cy="54" r="4" fill="#EF4444" opacity="0.3"/>
</svg>
